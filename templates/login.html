<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow col-md-4 mx-auto">
        <h3 class="text-center">Login</h3>

        <form method="POST">
            <input name="username" class="form-control mb-3" placeholder="Username">
            <input name="password" type="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100">Login</button>
        </form>

        <a href="/register" class="text-center mt-2 d-block">Register</a>
    </div>
</div>

</body>
</html>
