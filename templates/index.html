<!DOCTYPE html>
<html>
<head>
    <title>Assignment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <div class="d-flex justify-content-between">
            <h3>📋 Assignment Tracker</h3>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

        <div class="row text-center my-3">
            <div class="col"><div class="bg-primary text-white p-2">Total: {{total}}</div></div>
            <div class="col"><div class="bg-success text-white p-2">Completed: {{completed}}</div></div>
            <div class="col"><div class="bg-warning p-2">Pending: {{pending}}</div></div>
        </div>

        <form method="POST" action="/add" class="row g-2 mb-3">
            <div class="col-md-4">
                <input name="task" class="form-control" placeholder="Enter task" required>
            </div>

            <div class="col-md-3">
                <select name="priority" class="form-select">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>

            <div class="col-md-3">
                <input type="date" name="due_date" class="form-control">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>
        </form>

        {% for task in tasks %}
        <div class="border p-2 mb-2 rounded d-flex justify-content-between">
            <div>
                <b>{{task.name}}</b>
                <br>
                <span class="badge bg-info">{{task.priority}}</span>
                <span class="badge bg-secondary">{{task.due_date}}</span>

                {% if task.status == 'Completed' %}
                    <span class="badge bg-success">Completed</span>
                {% else %}
                    <span class="badge bg-warning">Pending</span>
                {% endif %}
            </div>

            <div>
                <a href="/complete/{{task.id}}" class="btn btn-success btn-sm">✔</a>
                <a href="/edit/{{task.id}}" class="btn btn-warning btn-sm">✏</a>
                <a href="/delete/{{task.id}}" class="btn btn-danger btn-sm">🗑</a>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
