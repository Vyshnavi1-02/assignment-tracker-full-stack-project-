<!DOCTYPE html>
<html>
<head>
    <title>Assignment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h3>Assignment Tracker</h3>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <hr>

    <!-- FILTER BUTTONS -->
    <div class="mb-3">
        <a href="/" class="btn btn-secondary btn-sm">All</a>
        <a href="/filter/Pending" class="btn btn-warning btn-sm">Pending</a>
        <a href="/filter/Completed" class="btn btn-success btn-sm">Completed</a>
    </div>

    <!-- ADD TASK -->
    <form action="/add" method="POST" class="row g-2 mb-3">

        <div class="col-md-3">
            <input type="text" name="title" class="form-control" placeholder="Task" required>
        </div>

        <div class="col-md-3">
            <input type="text" name="description" class="form-control" placeholder="Description" required>
        </div>

        <div class="col-md-2">
            <input type="date" name="deadline" class="form-control" required>
        </div>

        <div class="col-md-2">
            <select name="status" class="form-select">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Add</button>
        </div>

    </form>

    <!-- TASK LIST -->
    {% for task in tasks %}
    <div class="border p-2 mb-2 d-flex justify-content-between">

        <div>
            <b>{{ task.title }}</b> <br>
            {{ task.description }} <br>
            {{ task.deadline }} <br>

            {% if task.status == 'Completed' %}
                <span class="badge bg-success">Completed</span>
            {% else %}
                <span class="badge bg-warning text-dark">Pending</span>
            {% endif %}
        </div>

        <div>
            <form action="/update/{{ task.id }}" method="POST" style="display:inline;">
                <input type="hidden" name="title" value="{{ task.title }}">
                <input type="hidden" name="description" value="{{ task.description }}">
                <input type="hidden" name="deadline" value="{{ task.deadline }}">
                <input type="hidden" name="status" value="Completed">

                <button class="btn btn-success btn-sm">✔</button>
            </form>

            <a href="/delete/{{ task.id }}" onclick="return confirmDelete()" class="btn btn-danger btn-sm">Delete</a>
        </div>

    </div>
    {% endfor %}

</div>

<!-- JS CONFIRM -->
<script>
function confirmDelete() {
    return confirm("Are you sure you want to delete?");
}
</script>

</body>
</html>
