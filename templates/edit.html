<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow col-md-4 mx-auto">

        <h3>Edit Task</h3>

        <form method="POST">
            <input name="task" value="{{task.name}}" class="form-control mb-3">

            <select name="priority" class="form-select mb-3">
                <option {% if task.priority=='High' %}selected{% endif %}>High</option>
                <option {% if task.priority=='Medium' %}selected{% endif %}>Medium</option>
                <option {% if task.priority=='Low' %}selected{% endif %}>Low</option>
            </select>

            <input type="date" name="due_date" value="{{task.due_date}}" class="form-control mb-3">

            <button class="btn btn-primary w-100">Update</button>
        </form>

    </div>
</div>

</body>
</html>
